<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Profile</title>
</head>
<body>
    <h1>User Profile</h1>

    <!-- Flash messages shown after profile save operations. -->
    {% if messages %}
        <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <!-- BMI is calculated from saved height and weight in the model property. -->
    <p><strong>Current BMI:</strong>
        {% if profile and profile.bmi %}
            {{ profile.bmi }}
        {% else %}
            N/A
        {% endif %}
    </p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Profile</button>
    </form>
</body>
</html>
